apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-cephfs-rwx
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: opennebula-cephfs-dynamic
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-cephfs-rwx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-cephfs-rwx
  template:
    metadata:
      labels:
        app: demo-cephfs-rwx
    spec:
      containers:
        - name: writer
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(hostname) $(date -Iseconds)" >> /data/heartbeat.log
                sleep 10
              done
          volumeMounts:
            - name: shared
              mountPath: /data
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: demo-cephfs-rwx
