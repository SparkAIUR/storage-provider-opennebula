# Default values for opennebula-csi.

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

oneApiEndpoint: "http://localhost:2633/RPC2"

credentials:
  existingSecret:
    name: ""
    key: "credentials"
  inlineAuth: ""

image:
  repository: "nudevco/opennebula-csi"
  tag: "v0.4.4rc0"
  pullPolicy: "IfNotPresent"

imagePullSecrets: []
debugPort: null

driver:
  logLevel: 5
  defaultDatastores: []
  datastoreSelectionPolicy: "least-used"
  vmHotplugTimeoutSeconds: 120
  vmHotplugTimeoutBaseSeconds: 120
  vmHotplugTimeoutPer100GiSeconds: 60
  vmHotplugTimeoutMaxSeconds: 900
  vmHotplugStuckVmCooldownSeconds: 300
  nodeDeviceDiscoveryTimeoutSeconds: 30
  allowedDatastoreTypes:
    - "local"
    - "ceph"
    - "cephfs"
  extraArgs: []
  env: []

featureGates:
  compatibilityAwareSelection: true
  detachedDiskExpansion: true
  cephfsExpansion: true
  cephfsSnapshots: false
  cephfsClones: false
  cephfsSelfHealing: false
  topologyAccessibility: false

controller:
  replicaCount: 1
  logLevel: 3
  sidecarLogLevel: 3
  sidecarTimeoutSeconds: 960
  leaderElection:
    enabled: true
    leaseName: "opennebula-csi-controller"
    leaseNamespace: ""
    leaseDurationSeconds: 45
    renewDeadlineSeconds: 30
    retryPeriodSeconds: 10
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraArgs: []
  extraEnv: []

inventoryController:
  enabled: false
  namespace: ""
  replicaCount: 1
  logLevel: 3
  authorityMode: "strict"
  leaderElectionID: "opennebula-csi-inventory-controller"
  resyncSeconds:
    datastores: 60
    nodes: 30
  validation:
    enabled: true
    defaultImage: "ghcr.io/axboe/fio:latest"
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraArgs: []
  extraEnv: []

node:
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations:
    - operator: "Exists"
  affinity: {}
  extraArgs: []
  extraEnv: []

metrics:
  enabled: true
  path: /metrics
  driver:
    enabled: true
    port: 9810
  controller:
    service:
      annotations: {}
      labels: {}
    serviceMonitor:
      enabled: false
      namespace: ""
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
      annotations: {}
  node:
    service:
      annotations: {}
      labels: {}
    serviceMonitor:
      enabled: false
      namespace: ""
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
      annotations: {}
  ports:
    provisioner: 8685
    attacher: 8686
    resizer: 8687
    registrar: 8688

preflight:
  enabled: false
  failReleaseOnError: true
  localImmediateBindingPolicy: "warn"
  image:
    repository: ""
    tag: ""
  datastores: []
  nodeStageSecretRefs: []
  provisionerSecretRefs: []

snapshotter:
  enabled: true
  image: registry.k8s.io/sig-storage/csi-snapshotter:v8.2.1
  extraArgs: []

storageClasses: []
