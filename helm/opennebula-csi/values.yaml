# Default values for opennebula-csi.

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

oneApiEndpoint: "http://localhost:2633/RPC2"

credentials:
  existingSecret:
    name: ""
    key: "credentials"
  inlineAuth: ""

image:
  repository: "ghcr.io/sparkaiur/opennebula-csi"
  tag: "v0.3.1"
  pullPolicy: "IfNotPresent"

imagePullSecrets: []
debugPort: null

driver:
  logLevel: 5
  defaultDatastores: []
  datastoreSelectionPolicy: "least-used"
  allowedDatastoreTypes:
    - "local"
    - "ceph"
    - "cephfs"
  extraArgs: []
  env: []

controller:
  replicaCount: 1
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraArgs: []
  extraEnv: []

node:
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations:
    - operator: "Exists"
  affinity: {}
  extraArgs: []
  extraEnv: []

metrics:
  enabled: true
  path: /metrics
  controller:
    service:
      annotations: {}
      labels: {}
    serviceMonitor:
      enabled: false
      namespace: ""
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
      annotations: {}
  node:
    service:
      annotations: {}
      labels: {}
    serviceMonitor:
      enabled: false
      namespace: ""
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
      annotations: {}
  ports:
    provisioner: 8685
    attacher: 8686
    resizer: 8687
    registrar: 8688

storageClasses: []
