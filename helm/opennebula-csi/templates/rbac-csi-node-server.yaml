---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opennebula-csi.nodeServiceAccountName" . }}
  namespace: {{ include "opennebula-csi.namespace" . }}

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ printf "%s-node-runtime-state-role" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["opennebula-csi-hotplug-observations", "opennebula-csi-sticky-attachment-state", "opennebula-csi-node-device-state"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["opennebula-csi-hotplug-observations", "opennebula-csi-node-device-state"]
    verbs: ["update", "patch"]

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ printf "%s-node-runtime-state-binding" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opennebula-csi.nodeServiceAccountName" . }}
    namespace: {{ include "opennebula-csi.namespace" . }}
roleRef:
  kind: Role
  name: {{ printf "%s-node-runtime-state-role" (include "opennebula-csi.fullname" .) }}
  apiGroup: rbac.authorization.k8s.io

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ printf "%s-node-registrar-role" (include "opennebula-csi.fullname" .) }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ printf "%s-node-registrar-binding" (include "opennebula-csi.fullname" .) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opennebula-csi.nodeServiceAccountName" . }}
    namespace: {{ include "opennebula-csi.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ printf "%s-node-registrar-role" (include "opennebula-csi.fullname" .) }}
  apiGroup: rbac.authorization.k8s.io
