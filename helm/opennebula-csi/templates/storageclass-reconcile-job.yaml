{{- $storageClassReconcile := (get .Values "storageClassReconcile") | default dict -}}
{{- $storageClassReconcileEnabled := (get $storageClassReconcile "enabled") | default true -}}
{{- if and $storageClassReconcileEnabled .Values.storageClasses }}
{{- $manualMutationPolicy := (get $storageClassReconcile "manualMutationPolicy") | default "fail" -}}
{{- $adoptUnannotated := (get $storageClassReconcile "adoptUnannotated") | default true -}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-storageclass-reconcile" (include "opennebula-csi.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "opennebula-csi.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: storageclass-reconcile
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: storageclass-reconcile
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "opennebula-csi.controllerServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: storageclass-reconcile
          image: "{{ include "opennebula-csi.storageClassReconcileImageRepository" . }}:{{ include "opennebula-csi.storageClassReconcileImageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--mode=storageclass-reconcile"
            - "--storageclass-reconcile-namespace={{ include "opennebula-csi.namespace" . }}"
            - "--storageclass-reconcile-configmap={{ printf "%s-storageclass-reconcile" (include "opennebula-csi.fullname" .) | trunc 63 | trimSuffix "-" }}"
            - "--storageclass-reconcile-manual-policy={{ $manualMutationPolicy }}"
            - "--storageclass-reconcile-adopt-unannotated={{ $adoptUnannotated }}"
            - "--v={{ .Values.driver.logLevel }}"
{{- end }}
