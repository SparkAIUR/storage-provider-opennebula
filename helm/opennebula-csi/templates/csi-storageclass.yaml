{{- range .Values.storageClasses }}
{{- $specHash := include "opennebula-csi.storageClassSpecHash" . }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .name }}
  annotations:
  {{- with .annotations }}
{{ toYaml . | nindent 4 }}
  {{- end }}
    storage-provider.opennebula.sparkaiur.io/chart-managed: "true"
    storage-provider.opennebula.sparkaiur.io/release-name: {{ $.Release.Name | quote }}
    storage-provider.opennebula.sparkaiur.io/release-namespace: {{ (include "opennebula-csi.namespace" $) | quote }}
    storage-provider.opennebula.sparkaiur.io/spec-hash: {{ $specHash | quote }}
    storage-provider.opennebula.sparkaiur.io/applied-spec-hash: {{ $specHash | quote }}
  labels:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
  {{- with .labels }}
{{ toYaml . | nindent 4 }}
  {{- end }}
provisioner: csi.opennebula.io
reclaimPolicy: {{ default "Delete" .reclaimPolicy }}
allowVolumeExpansion: {{ default false .allowVolumeExpansion }}
mountOptions:
{{- if .mountOptions }}
{{ toYaml .mountOptions | nindent 2 }}
{{- else }}
  []
{{- end }}
volumeBindingMode: {{ default "Immediate" .volumeBindingMode }}
parameters:
{{- if .parameters }}
{{- range $key, $value := .parameters }}
  {{ $key }}: {{ printf "%v" $value | quote }}
{{- end }}
{{- else }}
  {}
{{- end }}
{{- end }}
