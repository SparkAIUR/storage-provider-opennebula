{{- if .Values.inventoryController.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opennebula-csi.inventoryServiceAccountName" . }}
  namespace: {{ include "opennebula-csi.namespace" . }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-inventory-role" (include "opennebula-csi.fullname" .) }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes", "persistentvolumeclaims", "pods", "pods/log", "events", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storageprovider.opennebula.sparkaiur.io"]
    resources: ["opennebuladatastores", "opennebulanodes", "opennebuladatastorebenchmarkruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storageprovider.opennebula.sparkaiur.io"]
    resources: ["opennebuladatastores/status", "opennebulanodes/status", "opennebuladatastorebenchmarkruns/status"]
    verbs: ["get", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-inventory-binding" (include "opennebula-csi.fullname" .) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opennebula-csi.inventoryServiceAccountName" . }}
    namespace: {{ include "opennebula-csi.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ printf "%s-inventory-role" (include "opennebula-csi.fullname" .) }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
