---
{{- $controller := (get .Values "controller") | default dict -}}
{{- $controllerLeaderElection := (get $controller "leaderElection") | default dict -}}
{{- $controllerLogLevel := (get $controller "logLevel") | default 3 -}}
{{- $controllerSidecarLogLevel := (get $controller "sidecarLogLevel") | default 3 -}}
{{- $leaderElectionEnabled := (get $controllerLeaderElection "enabled") | default true -}}
{{- $leaderElectionLeaseName := (get $controllerLeaderElection "leaseName") | default "opennebula-csi-controller" -}}
{{- $leaderElectionLeaseNamespace := (get $controllerLeaderElection "leaseNamespace") | default "" -}}
{{- if eq (trim (printf "%v" $leaderElectionLeaseNamespace)) "" -}}
{{- $leaderElectionLeaseNamespace = include "opennebula-csi.namespace" . -}}
{{- end }}
{{- $leaderElectionLeaseDuration := (get $controllerLeaderElection "leaseDurationSeconds") | default 45 -}}
{{- $leaderElectionRenewDeadline := (get $controllerLeaderElection "renewDeadlineSeconds") | default 30 -}}
{{ $leaderElectionRetryPeriod := (get $controllerLeaderElection "retryPeriodSeconds") | default 10 }}
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: {{ printf "%s-controller" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
spec:
  serviceName: {{ include "opennebula-csi.fullname" . | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: controller
  replicas: {{ .Values.controller.replicaCount }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: opennebula-csi
        {{- with .Values.controller.podAnnotations }}
{{ toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: controller
    spec:
      priorityClassName: system-cluster-critical
      serviceAccountName: {{ include "opennebula-csi.controllerServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: opennebula-csi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.debugPort .Values.metrics.driver.enabled }}
          ports:
            {{- if .Values.debugPort }}
            - containerPort: {{ .Values.debugPort }}
              name: debug
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.driver.enabled }}
            - containerPort: {{ .Values.metrics.driver.port }}
              name: driver-metrics
              protocol: TCP
            {{- end }}
          {{- end }}
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--v={{ $controllerLogLevel }}"
            - "--vmodule=leaderelection=0"
            {{- with .Values.driver.extraArgs }}
{{ toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.controller.extraArgs }}
{{ toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: ONE_CSI_CONTROLLER_LEADER_ELECTION_ENABLED
              value: {{ $leaderElectionEnabled | quote }}
            - name: ONE_CSI_CONTROLLER_LEADER_ELECTION_LEASE_NAME
              value: {{ $leaderElectionLeaseName | quote }}
            - name: ONE_CSI_CONTROLLER_LEADER_ELECTION_LEASE_NAMESPACE
              value: {{ $leaderElectionLeaseNamespace | quote }}
            - name: ONE_CSI_CONTROLLER_LEADER_ELECTION_LEASE_DURATION_SECONDS
              value: {{ $leaderElectionLeaseDuration | quote }}
            - name: ONE_CSI_CONTROLLER_LEADER_ELECTION_RENEW_DEADLINE_SECONDS
              value: {{ $leaderElectionRenewDeadline | quote }}
            - name: ONE_CSI_CONTROLLER_LEADER_ELECTION_RETRY_PERIOD_SECONDS
              value: {{ $leaderElectionRetryPeriod | quote }}
{{ include "opennebula-csi.driverCommonEnv" . | nindent 12 }}
            {{- with .Values.controller.extraEnv }}
{{ toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.controller.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.3.0
          imagePullPolicy: IfNotPresent
          {{- if .Values.metrics.enabled }}
          ports:
            - containerPort: {{ .Values.metrics.ports.provisioner }}
              name: prov-metrics
              protocol: TCP
          {{- end }}
          args:
            - "--v={{ $controllerSidecarLogLevel }}"
            - "--vmodule=leaderelection=0"
            - "--csi-address=$(ADDRESS)"
            - "--timeout={{ .Values.controller.sidecarTimeoutSeconds }}s"
            - "--default-fstype=ext4"
            - "--extra-create-metadata"
            {{- if .Values.metrics.enabled }}
            - "--http-endpoint=:{{ .Values.metrics.ports.provisioner }}"
            {{- end }}
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher:v4.9.0
          imagePullPolicy: IfNotPresent
          {{- if .Values.metrics.enabled }}
          ports:
            - containerPort: {{ .Values.metrics.ports.attacher }}
              name: att-metrics
              protocol: TCP
          {{- end }}
          args:
            - "--v={{ $controllerSidecarLogLevel }}"
            - "--vmodule=leaderelection=0"
            - "--csi-address=$(ADDRESS)"
            - "--timeout={{ .Values.controller.sidecarTimeoutSeconds }}s"
            {{- if .Values.metrics.enabled }}
            - "--http-endpoint=:{{ .Values.metrics.ports.attacher }}"
            {{- end }}
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.13.2
          imagePullPolicy: IfNotPresent
          {{- if .Values.metrics.enabled }}
          ports:
            - containerPort: {{ .Values.metrics.ports.resizer }}
              name: res-metrics
              protocol: TCP
          {{- end }}
          args:
            - "--v={{ $controllerSidecarLogLevel }}"
            - "--vmodule=leaderelection=0"
            - "--csi-address=$(ADDRESS)"
            - "--timeout={{ .Values.controller.sidecarTimeoutSeconds }}s"
            - "--leader-election"
            {{- if .Values.metrics.enabled }}
            - "--http-endpoint=:{{ .Values.metrics.ports.resizer }}"
            {{- end }}
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
        {{- if .Values.snapshotter.enabled }}
        - name: csi-snapshotter
          image: {{ .Values.snapshotter.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - "--v={{ $controllerSidecarLogLevel }}"
            - "--vmodule=leaderelection=0"
            - "--csi-address=$(ADDRESS)"
            - "--leader-election"
            {{- with .Values.snapshotter.extraArgs }}
{{ toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
        {{- end }}
        - name: liveness-probe
          imagePullPolicy: IfNotPresent
          image: registry.k8s.io/sig-storage/livenessprobe:v2.16.0
          args:
            - --csi-address=/csi/csi.sock
            - --probe-timeout=3s
            - --health-port=9808
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
      volumes:
        - name: csi-socket-dir
          emptyDir: {}
