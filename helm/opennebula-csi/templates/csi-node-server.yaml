---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: {{ printf "%s-node" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
spec:
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: node
      annotations:
        kubectl.kubernetes.io/default-container: opennebula-csi
        {{- with .Values.node.podAnnotations }}
{{ toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "opennebula-csi.nodeServiceAccountName" . }}
      priorityClassName: system-node-critical
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: opennebula-csi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.debugPort .Values.metrics.driver.enabled }}
          ports:
            {{- if .Values.debugPort }}
            - containerPort: {{ .Values.debugPort }}
              name: debug
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.driver.enabled }}
            - containerPort: {{ .Values.metrics.driver.port }}
              name: driver-metrics
              protocol: TCP
            {{- end }}
          {{- end }}
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--nodeid=$(NODE_ID)"
            - "--v={{ .Values.driver.logLevel }}"
            {{- with .Values.driver.extraArgs }}
{{ toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.node.extraArgs }}
{{ toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
{{ include "opennebula-csi.driverCommonEnv" . | nindent 12 }}
            {{- with .Values.node.extraEnv }}
{{ toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.node.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
            - name: pods-mount-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: device-dir
              mountPath: /dev
        - name: csi-node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.14.0
          {{- if .Values.metrics.enabled }}
          ports:
            - containerPort: {{ .Values.metrics.ports.registrar }}
              name: registrar-metrics
              protocol: TCP
          {{- end }}
          args:
            - "--v=5"
            - "--csi-address=$(ADDRESS)"
            - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
            {{- if .Values.metrics.enabled }}
            - "--http-endpoint=:{{ .Values.metrics.ports.registrar }}"
            {{- end }}
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: /var/lib/kubelet/plugins/csi.opennebula.io/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          imagePullPolicy: IfNotPresent
          image: registry.k8s.io/sig-storage/livenessprobe:v2.16.0
          args:
            - --csi-address=/csi/csi.sock
            - --probe-timeout=3s
            - --health-port=9808
          volumeMounts:
            - name: csi-socket-dir
              mountPath: /csi
      volumes:
        - name: csi-socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.opennebula.io
            type: DirectoryOrCreate
        - name: pods-mount-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
