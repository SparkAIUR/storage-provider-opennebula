{{- if .Values.metrics.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-controller-metrics" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: controller
    {{- with .Values.metrics.controller.service.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.controller.service.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: controller
  ports:
    - name: provisioner-metrics
      port: {{ .Values.metrics.ports.provisioner }}
      protocol: TCP
      targetPort: provisioner-metrics
    - name: attacher-metrics
      port: {{ .Values.metrics.ports.attacher }}
      protocol: TCP
      targetPort: attacher-metrics
    - name: resizer-metrics
      port: {{ .Values.metrics.ports.resizer }}
      protocol: TCP
      targetPort: resizer-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-node-metrics" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: node
    {{- with .Values.metrics.node.service.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.node.service.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: node
  ports:
    - name: registrar-metrics
      port: {{ .Values.metrics.ports.registrar }}
      protocol: TCP
      targetPort: registrar-metrics
{{- end }}
