{{- if .Values.metrics.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-controller-metrics" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: controller
    {{- with .Values.metrics.controller.service.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.controller.service.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: controller
  ports:
    {{- if .Values.metrics.driver.enabled }}
    - name: driver-metrics
      port: {{ .Values.metrics.driver.port }}
      protocol: TCP
      targetPort: driver-metrics
    {{- end }}
    - name: prov-metrics
      port: {{ .Values.metrics.ports.provisioner }}
      protocol: TCP
      targetPort: prov-metrics
    - name: att-metrics
      port: {{ .Values.metrics.ports.attacher }}
      protocol: TCP
      targetPort: att-metrics
    - name: res-metrics
      port: {{ .Values.metrics.ports.resizer }}
      protocol: TCP
      targetPort: res-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-node-metrics" (include "opennebula-csi.fullname" .) }}
  namespace: {{ include "opennebula-csi.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: node
    {{- with .Values.metrics.node.service.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.node.service.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "opennebula-csi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: node
  ports:
    {{- if .Values.metrics.driver.enabled }}
    - name: driver-metrics
      port: {{ .Values.metrics.driver.port }}
      protocol: TCP
      targetPort: driver-metrics
    {{- end }}
    - name: reg-metrics
      port: {{ .Values.metrics.ports.registrar }}
      protocol: TCP
      targetPort: reg-metrics
{{- end }}
