apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opennebulanodes.storageprovider.opennebula.sparkaiur.io
spec:
  group: storageprovider.opennebula.sparkaiur.io
  scope: Cluster
  names:
    plural: opennebulanodes
    singular: opennebulanode
    kind: OpenNebulaNode
    shortNames:
      - onenode
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: VM
          type: string
          jsonPath: .status.opennebula.vmName
        - name: State
          type: string
          jsonPath: .status.opennebula.state
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Attached
          type: integer
          jsonPath: .status.storage.attachedVolumeCount
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                opennebulaVMName:
                  type: string
                clusterName:
                  type: string
                enabled:
                  type: boolean
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
