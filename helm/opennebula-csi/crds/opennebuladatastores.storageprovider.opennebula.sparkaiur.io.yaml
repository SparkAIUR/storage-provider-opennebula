apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opennebuladatastores.storageprovider.opennebula.sparkaiur.io
spec:
  group: storageprovider.opennebula.sparkaiur.io
  scope: Cluster
  names:
    plural: opennebuladatastores
    singular: opennebuladatastore
    kind: OpenNebulaDatastore
    shortNames:
      - oneds
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Backend
          type: string
          jsonPath: .status.backend
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Free
          type: integer
          jsonPath: .status.capacity.freeBytes
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                displayName:
                  type: string
                enabled:
                  type: boolean
                notes:
                  type: string
                discovery:
                  type: object
                  properties:
                    opennebulaDatastoreID:
                      type: integer
                    expectedBackend:
                      type: string
                    allowed:
                      type: boolean
                validation:
                  type: object
                  properties:
                    mode:
                      type: string
                    runNonce:
                      type: string
                    jobTemplate:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
