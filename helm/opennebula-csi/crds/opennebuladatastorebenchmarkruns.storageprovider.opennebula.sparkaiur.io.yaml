apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opennebuladatastorebenchmarkruns.storageprovider.opennebula.sparkaiur.io
spec:
  group: storageprovider.opennebula.sparkaiur.io
  scope: Cluster
  names:
    kind: OpenNebulaDatastoreBenchmarkRun
    plural: opennebuladatastorebenchmarkruns
    singular: opennebuladatastorebenchmarkrun
    shortNames:
      - onedsbench
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Datastore
          type: string
          jsonPath: .status.datastoreName
        - name: ID
          type: integer
          jsonPath: .status.datastoreID
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Summary
          type: string
          jsonPath: .status.summary
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                datastoreID:
                  type: integer
                storageClassName:
                  type: string
                size:
                  type: string
                accessModes:
                  type: array
                  items:
                    type: string
                fioArgs:
                  type: array
                  items:
                    type: string
                image:
                  type: string
                imagePullPolicy:
                  type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  type: array
                  items:
                    x-kubernetes-preserve-unknown-fields: true
                resources:
                  x-kubernetes-preserve-unknown-fields: true
                activeDeadlineSeconds:
                  type: integer
                  format: int64
                ttlSecondsAfterFinished:
                  type: integer
                notes:
                  type: string
              required:
                - datastoreID
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                phase:
                  type: string
                datastoreID:
                  type: integer
                datastoreName:
                  type: string
                backend:
                  type: string
                jobName:
                  type: string
                pvcName:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                summary:
                  type: string
                message:
                  type: string
                result:
                  type: object
                  properties:
                    readIops:
                      type: integer
                    writeIops:
                      type: integer
                    readBwBytes:
                      type: integer
                    writeBwBytes:
                      type: integer
                    latencyP50Micros:
                      type: integer
                    latencyP99Micros:
                      type: integer
      subresources:
        status: {}
